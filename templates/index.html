<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>IngenioSnack - MVP</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #fff3e0; text-align: center; padding: 50px; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        button { background-color: #ff9800; color: white; border: none; padding: 10px 20px; font-size: 16px; border-radius: 5px; cursor: pointer; }
        button:hover { background-color: #e68a00; }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="color: #ff9800;">IngenioSnack 🥪</h1>
        <p>Pide antes de que termine tu clase</p>
        
        <form action="/calcular" method="POST">
            <div style="text-align: left; margin-bottom: 20px;">
                <label><input type="checkbox" name="producto" value="Sándwich de Pollo,10.0"> Sándwich de Pollo (S/ 10.00)</label><br><br>
                <label><input type="checkbox" name="producto" value="Sándwich Mixto,8.0"> Sándwich Mixto (S/ 8.00)</label><br><br>
                <label><input type="checkbox" name="producto" value="Café Americano,3.5"> Café Americano (S/ 3.50)</label><br><br>
                <hr>
                <label><input type="checkbox" name="cupon" value="true"> 🎁 Tengo Cupón de Fidelidad</label>
            </div>
            <button type="submit">Realizar Pedido (Pago contra entrega)</button>
        </form>

        {% if total %}
            <h2 style="color: #2e7d32;">Total a pagar: S/ {{ total }}</h2>
            <p><small>(Incluye S/ 5.00 de delivery a la FIS)</small></p>
        {% endif %}
        <br><br>
        <a href="/admin" style="color: #ccc; text-decoration: none; font-size: 12px;">Acceso Admin</a>
    </div>
</body>
</html>
