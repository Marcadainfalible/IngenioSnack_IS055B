<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IngenioSnack - IS055B</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar-brand { font-weight: bold; color: #ff9800 !important; }

        .contenedor-img {
            width: 100%;
            height: 180px;          /* Altura fija para que todas las tarjetas midan igual */
            padding: 12px;          /* Espaciado interno (padding) para que la imagen no choque con los bordes */
            display: flex;          /* Activamos flexbox para centrar */
            justify-content: center;/* Centrado horizontal de la imagen */
            align-items: center;    /* Centrado vertical de la imagen */
            background-color: #f9f9f9; /* Fondo sutil por si la imagen tiene transparencias */
            box-sizing: border-box; /* Asegura que el padding no deforme los 180px de altura */
        }
                
        .img-producto {
            max-width: 100%;        /* No permite que la imagen se desborde del contenedor */
            max-height: 100%;       /* No permite que altere la altura asignada */
            width: auto;            /* Mantiene la proporción original a lo ancho */
            height: 200px;           /* Mantiene la proporción original a lo alto */
            object-fit: contain;    /* ESCENCIAL: Escala la imagen para que se vea completa sin recortarse ni estirarse */
            border-radius: 8px;     /* Bordes suavemente redondeados para la foto */
        }   

    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">IngenioSnack 🥪</a>
            <div class="d-flex align-items-center">
            <span class="text-light me-3 d-none d-md-block small"> <strong> {{session.get('estudiante_nombre', 'Estudiante')}} </strong> </span>
            <a href="/logout" class="btn btn-outline-warning btn-sm fw-bold px-3">
                Cerrar Sesión 🚪
            </a>
        </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <footer class="text-center text-muted mt-5 mb-3">
        <small>&copy; 2026 Equipo IngenioSnack - Metodología XP</small>
    </footer>
    <script>
        window.onpageshow = function(event) {
            // Si el navegador intenta cargar esta página desde su historial/caché secreto...
            if (event.persisted) {
                // ...lo forzamos a recargar la página directamente desde el servidor
                window.location.reload(); 
            }
        };
    </script>
</body>
</html>
