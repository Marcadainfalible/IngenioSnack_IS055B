<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IngenioSnack - IS055B</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar-brand { font-weight: bold; color: #ff9800 !important; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">IngenioSnack 🥪</a>
            <div class="d-flex align-items-center">
            <span class="text-light me-3 d-none d-md-block small">Campus FIS</span>
            <a href="/logout" class="btn btn-outline-warning btn-sm fw-bold px-3">
                Cerrar Sesión 🚪
            </a>
        </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <footer class="text-center text-muted mt-5 mb-3">
        <small>&copy; 2026 Equipo IngenioSnack - Metodología XP</small>
    </footer>
    <script>
        window.onpageshow = function(event) {
            // Si el navegador intenta cargar esta página desde su historial/caché secreto...
            if (event.persisted) {
                // ...lo forzamos a recargar la página directamente desde el servidor
                window.location.reload(); 
            }
        };
    </script>
</body>
</html>
