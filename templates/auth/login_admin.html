<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - IngenioSnack</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/loginadmin.css') }}">
</head>

<body>

    <div class="login-card">

        <div class="logo-circle">
            <i class="fas fa-user-shield"></i>
        </div>

        <h2 class="brand-title">IngenioSnack</h2>
        <p class="brand-subtitle">Panel de Administración</p>

        <form action="/procesar_login_admin" method="POST">

            <div class="mb-3">
                <label class="form-label">Correo Electrónico</label>

                <div class="input-group">
                    <span class="input-group-text">
                        <i class="fas fa-envelope"></i>
                    </span>

                    <input type="email"
                           name="email"
                           class="form-control"
                           placeholder="admin@ingeniosnack.com"
                           required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label">Contraseña</label>

                <div class="input-group">
                    <span class="input-group-text">
                        <i class="fas fa-lock"></i>
                    </span>

                    <input type="password"
                           name="password"
                           class="form-control"
                           placeholder="••••••••"
                           required>
                </div>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-orange">
                    <i class="fas fa-sign-in-alt me-2"></i>
                    Iniciar Sesión
                </button>
            </div>

        </form>

        <a href="/login" class="link-back">
            ← Volver al login de estudiantes
        </a>

    </div>

</body>
</html>
