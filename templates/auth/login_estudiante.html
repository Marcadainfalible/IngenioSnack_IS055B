<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IngenioSnack - Iniciar Sesión</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/loginusuario.css') }}">
  
</head>
<body>

    <h1 class="brand-title">IngenioSnack</h1>
    <p class="brand-subtitle">Tu snack favorito en el campus</p>

    <div class="login-card">
       <ul class="nav nav-pills mb-4" id="pills-tab" role="tablist">
            <li class="nav-item flex-fill" role="presentation">
                <button class="nav-link active w-100"
                  id="btn-tab-login"
                   type="button"
                   onclick="cambiarTab('login')">
                   Iniciar Sesión
               </button>
         </li>
          <li class="nav-item flex-fill" role="presentation">
               <button class="nav-link w-100"
                  id="btn-tab-registro"
                  type="button"
                   onclick="cambiarTab('registro')">
                  Registrarse
                </button>
          </li>
     </ul>

        <form id="form-login" action="/procesar_login" method="POST">
            <div class="mb-3">
                <label class="form-label">Código de Matrícula</label>
                <input type="text" name="codigo" class="form-control" placeholder="Ej: 2024101136k" required pattern="[0-9]{10}[a-zA-Z]{1}">
            </div>
            <div class="mb-4">
                <label class="form-label">Contraseña</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <div class="d-grid mb-4">
                <button type="submit" class="btn btn-orange shadow-sm">Iniciar Sesión</button>
            </div>
            
            <div class="divider">inicia sesión tambien con</div>
            
            <div class="d-grid">
                <a href="/login/google" class="btn btn-outline-dark w-100 mb-3 fw-bold shadow-sm d-flex justify-content-center align-items-center">
                    <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" alt="Google" width="20" class="me-2">
                    Continuar con Google
                </a>
            </div>
        </form>

        <form id="form-registro" action="/procesar_registro" method="POST" class="d-none">
            <div class="mb-3">
                <label class="form-label">Código de Matrícula</label>
                <input type="text" name="codigo" class="form-control" placeholder="Ej: 2024101136k" required pattern="[0-9]{10}[a-zA-Z]{1}">
            </div>
            <div class="mb-3">
                <label class="form-label">Nombre Completo</label>
                <input type="text" name="nombre" class="form-control" placeholder="Juan Pérez" required>
            </div>
            <div class="mb-4">
                <label class="form-label">Contraseña</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required minlength="6">
            </div>
            <div class="d-grid">
                <button type="submit" class="btn btn-orange shadow-sm">Crear Cuenta</button>
            </div>
        </form>

        <a href="/login/admin" class="link-admin mt-4">¿Eres administrador?</a>
    </div>

    <script>
        function cambiarTab(tab) {
            const formLogin = document.getElementById('form-login');
            const formRegistro = document.getElementById('form-registro');
            const btnLogin = document.getElementById('btn-tab-login');
            const btnRegistro = document.getElementById('btn-tab-registro');

            if (tab === 'login') {
                formLogin.classList.remove('d-none');
                formRegistro.classList.add('d-none');
                btnLogin.classList.add('active');
                btnRegistro.classList.remove('active');
            } else {
                formLogin.classList.add('d-none');
                formRegistro.classList.remove('d-none');
                btnLogin.classList.remove('active');
                btnRegistro.classList.add('active');
            }
        }
    </script>

</body>
</html>
