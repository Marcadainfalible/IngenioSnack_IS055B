<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IngenioSnack - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
   <style>
    body{
        min-height:100vh;
        display:flex;
        flex-direction:column;
        justify-content:center;
        align-items:center;
        background: linear-gradient(135deg,#ff7b00,#ffb347);
        font-family:'Segoe UI',sans-serif;
        overflow:hidden;
        position:relative;
    }

    body::before,
    body::after{
        content:'';
        position:absolute;
        border-radius:50%;
        background:rgba(255,255,255,0.12);
    }

    body::before{
        width:320px;
        height:320px;
        top:-120px;
        left:-120px;
    }

    body::after{
        width:260px;
        height:260px;
        bottom:-90px;
        right:-90px;
    }

    .brand-title{
        color:white;
        font-size:3.3rem;
        font-weight:900;
        margin-bottom:0;
        text-shadow:0 3px 8px rgba(0,0,0,.15);
    }

    .brand-subtitle{
        color:white;
        opacity:.95;
        margin-bottom:30px;
        font-size:1.1rem;
    }

    .login-card{
        background:rgba(255,255,255,.95);
        backdrop-filter:blur(10px);
        width:100%;
        max-width:460px;
        padding:40px;
        border-radius:30px;
        box-shadow:0 20px 50px rgba(0,0,0,.15);
        animation:entrada .8s ease;
    }

    @keyframes entrada{
        from{
            opacity:0;
            transform:translateY(25px);
        }
        to{
            opacity:1;
            transform:translateY(0);
        }
    }

   .nav-pills{
    background:#f5f5f5;
    border-radius:40px;
    padding:6px;
    display:flex;
}

.nav-pills .nav-link{
    width:100%;
    border-radius:30px;
    font-weight:700;
    color:#777;
    transition:.3s;
    padding:14px 0;
    text-align:center;
    border:none;
    background:transparent;
}

.nav-pills .nav-link.active{
    background:linear-gradient(135deg,#ff6b00,#ff9800);
    color:white;
    box-shadow:0 5px 15px rgba(255,107,0,.3);
}
   

    .form-label{
        font-weight:600;
        color:#444;
    }

    .form-control{
        border:none;
        border-radius:15px;
        padding:14px;
        background:#f4f5f7;
        transition:.3s;
    }

    .form-control:focus{
        background:white;
        box-shadow:0 0 0 3px rgba(255,107,0,.2);
    }

    .btn-orange{
        background:linear-gradient(135deg,#ff6b00,#ff9800);
        color:white;
        border:none;
        border-radius:15px;
        padding:14px;
        font-size:1rem;
        font-weight:700;
        transition:.3s;
    }

    .btn-orange:hover{
        color:white;
        transform:translateY(-3px);
        box-shadow:0 10px 20px rgba(255,107,0,.3);
    }

    .divider{
        display:flex;
        align-items:center;
        text-align:center;
        color:#999;
        margin:25px 0;
    }

    .divider::before,
    .divider::after{
        content:'';
        flex:1;
        border-bottom:1px solid #ddd;
    }

    .divider::before{
        margin-right:10px;
    }

    .divider::after{
        margin-left:10px;
    }

    .btn-outline-dark{
        border-radius:15px;
        padding:12px;
        transition:.3s;
    }

    .btn-outline-dark:hover{
        transform:translateY(-2px);
    }

    .link-admin{
        display:block;
        text-align:center;
        margin-top:25px;
        color:#666;
        text-decoration:none;
        font-weight:500;
    }

    .link-admin:hover{
        color:#ff6b00;
    }
</style>
</head>
<body>

    <h1 class="brand-title">IngenioSnack</h1>
    <p class="brand-subtitle">Tu snack favorito en el campus</p>

    <div class="login-card">
       <ul class="nav nav-pills mb-4" id="pills-tab" role="tablist">
            <li class="nav-item flex-fill" role="presentation">
                <button class="nav-link active w-100"
                  id="btn-tab-login"
                   type="button"
                   onclick="cambiarTab('login')">
                   Iniciar Sesión
               </button>
         </li>
          <li class="nav-item flex-fill" role="presentation">
               <button class="nav-link w-100"
                  id="btn-tab-registro"
                  type="button"
                   onclick="cambiarTab('registro')">
                 Registrarse
                </button>
          </li>
     </ul>

        <form id="form-login" action="/procesar_login" method="POST">
            <div class="mb-3">
                <label class="form-label">Código de Matrícula</label>
                <input type="text" name="codigo" class="form-control" placeholder="Ej: 2024101136k" required pattern="[0-9]{10}[a-zA-Z]{1}">
            </div>
            <div class="mb-4">
                <label class="form-label">Contraseña</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <div class="d-grid mb-4">
                <button type="submit" class="btn btn-orange shadow-sm">Iniciar Sesión</button>
            </div>
            
            <div class="divider">o si eres egresado</div>
            
            <div class="d-grid">
                <a href="/login/google" class="btn btn-outline-dark w-100 mb-3 fw-bold shadow-sm d-flex justify-content-center align-items-center">
                    <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" alt="Google" width="20" class="me-2">
                    Continuar con Google
                </a>
            </div>
        </form>

        <form id="form-registro" action="/procesar_registro" method="POST" class="d-none">
            <div class="mb-3">
                <label class="form-label">Código de Matrícula</label>
                <input type="text" name="codigo" class="form-control" placeholder="Ej: 2024101136k" required pattern="[0-9]{10}[a-zA-Z]{1}">
            </div>
            <div class="mb-3">
                <label class="form-label">Nombre Completo</label>
                <input type="text" name="nombre" class="form-control" placeholder="Juan Pérez" required>
            </div>
            <div class="mb-4">
                <label class="form-label">Contraseña</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required minlength="6">
            </div>
            <div class="d-grid">
                <button type="submit" class="btn btn-orange shadow-sm">Crear Cuenta</button>
            </div>
        </form>

        <a href="/login/admin" class="link-admin mt-4">¿Eres administrador?</a>
    </div>

    <script>
        function cambiarTab(tab) {
            const formLogin = document.getElementById('form-login');
            const formRegistro = document.getElementById('form-registro');
            const btnLogin = document.getElementById('btn-tab-login');
            const btnRegistro = document.getElementById('btn-tab-registro');

            if (tab === 'login') {
                formLogin.classList.remove('d-none');
                formRegistro.classList.add('d-none');
                btnLogin.classList.add('active');
                btnRegistro.classList.remove('active');
            } else {
                formLogin.classList.add('d-none');
                formRegistro.classList.remove('d-none');
                btnLogin.classList.remove('active');
                btnRegistro.classList.add('active');
            }
        }
    </script>

</body>
</html>
