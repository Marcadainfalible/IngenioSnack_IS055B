<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - IngenioSnack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; }
        /* Estilos para que la barra lateral ocupe toda la altura */
        .sidebar {
            min-height: 100vh;
            background-color: #212529; /* Un tono oscuro y muy formal */
        }
        .nav-link {
            color: #adb5bd;
            font-weight: 500;
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 5px;
            transition: all 0.3s ease;
        }
        .nav-link:hover, .nav-link.active {
            color: #fff;
            background-color: #0d6efd; /* Azul profesional al pasar el mouse */
        }
        .logout-btn {
            color: #ff6b6b;
        }
        .logout-btn:hover {
            color: #fff;
            background-color: #dc3545;
        }
    </style>
</head>
<body>

<div class="d-flex">
    <div class="sidebar d-flex flex-column p-3 text-white" style="width: 280px;">
        <a href="/admin" class="d-flex align-items-center mb-4 text-white text-decoration-none">
            <span class="fs-4 fw-bold">IngenioSnack <span class="fs-5">👨‍🍳</span></span>
        </a>
        <hr class="mt-0 mb-4 text-secondary">
        
        <ul class="nav nav-pills flex-column mb-auto">
            <li>
                <a href="/admin" class="nav-link" id="nav-pedidos">
                    📋 Pedidos en Vivo
                </a>
            </li>
            <li>
                <a href="/admin/inventario" class="nav-link" id="nav-inventario">
                    📦 Inventario & Menú
                </a>
            </li>
            <li>
                <a href="/admin/estadisticas" class="nav-link" id="nav-estadisticas">
                    📊 Estadísticas (Parciales)
                </a>
            </li>
            <li>
                <a href="/admin/vip" class="nav-link" id="nav-vip">
                    🏆 Clientes VIP
                </a>
            </li>
        </ul>
        
        <hr class="text-secondary">
        <a href="#" class="nav-link logout-btn d-flex align-items-center fw-bold">
            ⏻ Cerrar Sesión
        </a>
    </div>

    <div class="flex-grow-1 p-5 overflow-auto" style="height: 100vh;">
        {% block content %}{% endblock %}
    </div>
</div>
<script>
    // El GPS que pinta el botón azul dependiendo de la pestaña
    const path = window.location.pathname;
    if (path === '/admin/inventario') {
        document.getElementById('nav-inventario').classList.add('active');
    } else if (path === '/admin') {
        document.getElementById('nav-pedidos').classList.add('active');
    } else if (path === '/admin/estadisticas') {
        document.getElementById('nav-estadisticas').classList.add('active');
    } else if (path === '/admin/vip') {
        document.getElementById('nav-vip').classList.add('active'); 
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
